<script>
  // Map of YYYY-M-D (no leading zeros) → dated tips page
  const TIPS = {
    '2026-5-29': '/horse-racing-tips-friday-29-may-2026.html',
    '2026-5-30': '/horse-racing-tips-saturday-30-may-2026.html',
    '2026-5-31': '/horse-racing-tips-sunday-31-may-2026.html',
  };
  var d = new Date();
  var key = d.getFullYear() + '-' + (d.getMonth()+1) + '-' + d.getDate();
  var dest = TIPS[key];
  if (dest) {
    window.location.replace(dest);
  } else {
    // No tips page for today — redirect to latest Saturday
    window.location.replace('/horse-racing-tips-sunday-31-may-2026.html');
  }
</script>
